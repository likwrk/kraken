<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Sensor Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app-root">
      <header class="app-header">
        <h1>Sensor Dashboard</h1>
        <div class="header-actions">
          <button id="btn-add-chart" class="btn-primary">+ Add Chart</button>
          <button id="btn-reset-config" class="btn-text">Reset API URL</button>
        </div>
      </header>

      <main class="dashboard">
        <!-- Dynamic chart containers will be injected here -->
        <div id="charts-container" class="charts-grid"></div>
        <div id="status-msg" class="status-msg"></div>
      </main>
    </div>

    <!-- Main Application Logic -->
    <script type="module" src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  </body>
</html>
